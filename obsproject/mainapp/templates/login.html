{% extends 'base.html'%}
{% load static %}
{% block main %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <div class="text-center mb-4">
          <!-- <img src="{% static 'img/book.png' %}" alt="Book Store Logo" width="80" class="mb-2"> -->
          <h3 class="fw-bold text-primary">Online Book Store</h3>
          <p class="text-muted">Welcome back! Please log in to continue.</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="">
          {% csrf_token %}

          <!-- Username -->
          <div class="form-group mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input 
              type="text" 
              name="username" 
              id="username" 
              class="form-control form-control-lg rounded-pill" 
              placeholder="Enter your username" 
              required>
          </div>

          <!-- Password -->
          <div class="form-group mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input 
              type="password" 
              name="password" 
              id="password" 
              class="form-control form-control-lg rounded-pill" 
              placeholder="Enter your password" 
              required>
          </div>

          <!-- Remember Me -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="#" class="text-decoration-none small text-primary">Forgot Password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
            Login
          </button>

          <p class="text-center mt-3 mb-0">
            Don’t have an account? 
            <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
