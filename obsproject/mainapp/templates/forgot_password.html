{% extends 'base.html' %}
{% load static %}
{% block main %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <div class="text-center mb-4">
          <h3 class="fw-bold text-primary">Forgot Password</h3>
          <p class="text-muted">Enter your registered email to reset your password.</p>
        </div>

        {% if messages %}
        {% for m in messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ m }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="">
          {% csrf_token %}
          <div class="form-group mb-3">
            <label for="email" class="form-label fw-semibold">Registered Email</label>
            <input
              type="email"
              name="email"
              id="email"
              class="form-control form-control-lg rounded-pill"
              placeholder="Enter your email"
              required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
            Continue
          </button>
          <p class="text-center mt-3 mb-0">
            <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
