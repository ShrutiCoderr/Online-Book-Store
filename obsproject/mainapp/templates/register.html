{% extends 'base.html' %}
{% load static %}
{% block main %}
<h1 class="text-center">Register Here</h1>
<div class="row">
    <div class="col-sm-10 mx-auto">
          <div class="row">
            <div class="col-sm-6">
                {% if messages %}
                {% for m in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{m}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <label for="name">Name</label>
                    <input type="text" name="name" class="form-control mb-4" id="name">
                    <label for="email">Email</label>
                    <input type="email" name="email" class="form-control mb-4" id="email">
                    <label for="cn">Contactno</label>
                    <input type="number" name="contactno" class="form-control mb-4" id="cn">
                    <label for="pass">Password</label>
                    <input type="password" name="password" class="form-control mb-4" id="pass">
                    <label for="cpass">Confirm Password</label>
                    <input type="password" name="cpassword" class="form-control mb-4" id="cpass">
                    <button type="submit" class="btn btn-success">Register</button>

                </form>
            </div>
            <div class="col-sm-6"></div>
          </div>
    </div>
</div>
{% endblock %}
