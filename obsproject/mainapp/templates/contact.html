{% extends 'base.html' %}
{% load static %}
{% block main %}
<h1 class="text-center">Contact US</h1>
<div class="row">
    <div class="col-sm-10 mx-auto">
        <div class="row">
            <div class="col-sm-6" style="margin-left: 250px;" >
                {% if messages %}
                {% for m in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{m}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <label for="n">Name</label>
                    <input type="text" name="name" class="form-control mb-4" id="n">
                    <label for="em">Email</label>
                    <input type="email" name="email" class="form-control mb-4" id="em">
                    <label for="cn">Contact No</label>
                    <input type="number" name="contactno" class="form-control mb-4" id="cn">
                    <label for="sub">Subject</label>
                    <input type="text" name="subject" class="form-control mb-4" id="sub">
                    <label for="msg">message</label>
                    <textarea name="message" name="message" class="form-control mb-4" id="msg"></textarea>
                    <button type="submit" class="btn btn-success">Submit</button>

                </form>
            </div>
            <div class="col-sm-6"></div>
        </div>
    </div>
</div>
{% endblock %}
